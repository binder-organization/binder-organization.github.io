        <script>
            (function () {
                function getPref(key, fallback) {
                    try {
                        var v = localStorage.getItem(key);
                        if (v !== null && v !== undefined) return v;
                    } catch (e) {}
                    var c = document.cookie.match(
                        new RegExp("(^| )" + key + "=([^;]+)"),
                    );
                    if (c) return decodeURIComponent(c[2]);
                    return fallback;
                }
                function setPref(key, val) {
                    try {
                        localStorage.setItem(key, val);
                    } catch (e) {}
                    document.cookie =
                        key +
                        "=" +
                        encodeURIComponent(val) +
                        ";path=/;max-age=31536000;SameSite=Lax";
                }
                window.__setPref = setPref;
                window.__getPref = getPref;

                var t = getPref(
                    "theme",
                    window.matchMedia("(prefers-color-scheme: dark)").matches
                        ? "dark"
                        : "light",
                );
                document.documentElement.setAttribute("data-theme", t);
                var l = getPref("lang", "zh");
                document.documentElement.lang = l === "zh" ? "zh-CN" : "en";

                window.addEventListener("pageshow", function (e) {
                    if (e.persisted) {
                        var t2 = getPref("theme", "light");
                        document.documentElement.setAttribute("data-theme", t2);
                        var l2 = getPref("lang", "zh");
                        document.documentElement.lang =
                            l2 === "zh" ? "zh-CN" : "en";
                    }
                });
            })();
        </script>
